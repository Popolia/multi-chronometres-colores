<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2327"/>
      <stop offset="100%" stop-color="#2b3238"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi -->
  <rect x="0" y="0" width="400" height="400" rx="64" fill="url(#bg)"/>

  <!-- Trois arcs colorés représentant les lignes/chronos -->
  <circle cx="200" cy="210" r="120" fill="none" stroke="#e74c3c" stroke-width="14"
          stroke-linecap="round" stroke-dasharray="220 550" transform="rotate(-90 200 210)"/>
  <circle cx="200" cy="210" r="120" fill="none" stroke="#3498db" stroke-width="14"
          stroke-linecap="round" stroke-dasharray="170 550" stroke-dashoffset="-230" transform="rotate(-90 200 210)"/>
  <circle cx="200" cy="210" r="120" fill="none" stroke="#2ecc71" stroke-width="14"
          stroke-linecap="round" stroke-dasharray="120 550" stroke-dashoffset="-410" transform="rotate(-90 200 210)"/>

  <!-- Boutons du chronomètre en haut -->
  <rect x="182" y="52" width="36" height="20" rx="8" fill="#c7ccd1"/>
  <rect x="160" y="60" width="18" height="26" rx="8" fill="#c7ccd1" transform="rotate(-35 169 73)"/>

  <!-- Aiguille du chrono -->
  <line x1="200" y1="210" x2="200" y2="130" stroke="#f4f6f7" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="210" x2="255" y2="210" stroke="#f4f6f7" stroke-width="8" stroke-linecap="round"/>
  <circle cx="200" cy="210" r="12" fill="#f4f6f7"/>
</svg>
